<!DOCTYPE html>
<html ng-app="app">
<head>
<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
<title>Experiment No.5 </title>
</head>

<body ng-controller="formCtrl">
<h1>Que.3 Form validation on Submit button click using ng-click</h1>
<h3>User Form</h3>

<form>
    Username:
    <input type="text" ng-model="user.name"><br><br>

    Password:
    <input type="password" ng-model="user.pass"><br><br>

    <button ng-click="validate()">Submit</button>
</form>

<p>{{message}}</p>

<script>
var app = angular.module("app", []);
app.controller("formCtrl", function($scope) {
    $scope.validate = function() {
        if (!$scope.user || !$scope.user.name || !$scope.user.pass) {
            $scope.message = "All fields are required";
        } else {
            $scope.message = "Form Submitted Successfully";
        }
    };
});
</script>

</body>
</html>
