<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />

        <title>Experiment No.3 </title>

    <body>
        <h1>Que.5.How do you convert JSON object into JavaScript object? </h1>
        <script>
        let jsonData = '{"name":"Amit","age":22}';
        let obj = JSON.parse(jsonData);

        document.write(obj.name + "<br>");
        document.write(obj.age);
        </script>

    </body>
</html>
