    <body>
        <h1>Que.2.Create JSON object Person with default values (name, age, city) and display </h1>
        <script>
        let Person = {
            "name": "Rahul",
            "age": 25,
            "city": "Satara"
        };

        document.write("Name: " + Person.name + "<br>");
        document.write("Age: " + Person.age + "<br>");
        document.write("City: " + Person.city);
        </script>


    </body>
